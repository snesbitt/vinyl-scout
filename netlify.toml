[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback for /login.html etc is already correct;
# function paths are declared via `export const config = { path: ... }`
# inside each function file.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
