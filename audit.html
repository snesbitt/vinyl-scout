<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinyl Scout · Audit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=19" />
  <style>
    .audit-toolbar {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .audit-toolbar__search {
      flex: 1;
      min-width: 240px;
      border: 1px solid var(--rule);
      background: var(--surface);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink);
      border-radius: 2px;
    }
    .audit-toolbar__search:focus { outline: none; border-color: var(--accent); }
    .audit-toolbar__count {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--ink-faint);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .audit-help {
      max-width: 1100px;
      margin: 12px auto 0;
      padding: 12px 32px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }
    .audit-help kbd {
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 10px;
    }
    .audit-list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 32px 80px;
    }
    .audit-row {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      grid-template-areas: "cover meta actions";
      gap: 20px;
      padding: 18px 0;
      border-bottom: 1px solid var(--rule-soft);
      align-items: center;
    }
    .audit-row__cover {
      grid-area: cover;
      position: relative;
      cursor: pointer;
      width: 96px;
      height: 96px;
      display: block;
    }
    .audit-row__cover img,
    .audit-row__cover .nocover {
      width: 96px;
      height: 96px;
      border-radius: 2px;
      display: block;
    }
    .audit-row__cover img { object-fit: cover; background: var(--rule); }
    .audit-row__cover .nocover {
      background: var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-faint);
      font-size: 9px;
      font-family: var(--mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .audit-row__cover input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }
    .audit-row__cover::after {
      content: 'replace';
      position: absolute;
      inset: 0;
      background: rgba(28,32,24,0.7);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 120ms;
      pointer-events: none;
      border-radius: 2px;
    }
    .audit-row__cover:hover::after { opacity: 1; }
    .audit-row__cover.is-uploading::after {
      content: 'uploading';
      opacity: 1;
      background: rgba(168,128,28,0.85);
    }
    .audit-row__meta {
      grid-area: meta;
      display: grid;
      gap: 4px;
      grid-template-columns: 1fr 1fr 150px;
      grid-template-areas:
        "artist artist artist"
        "title title title"
        "year genre cond"
        "press press press";
    }
    .audit-input {
      font-family: var(--sans);
      font-size: 14px;
      border: 1px solid transparent;
      background: transparent;
      padding: 8px 10px;
      border-radius: 2px;
      color: var(--ink);
      transition: border-color 120ms, background 120ms;
      width: 100%;
      min-height: 36px;
      -webkit-appearance: none;
    }
    .audit-input:hover { background: var(--bg-soft); }
    .audit-input:focus { background: var(--bg-soft); border-color: var(--rule); outline: none; }
    .audit-input.is-saving { border-color: var(--gold); }
    .audit-input.is-saved { border-color: var(--good); }
    .audit-input.is-error { border-color: var(--accent); background: rgba(181,48,38,0.06); }
    .audit-input.js-artist { grid-area: artist; font-weight: 600; font-size: 15px; }
    .audit-input.js-title { grid-area: title; color: var(--ink-soft); font-style: italic; }
    .audit-input.js-year { grid-area: year; font-family: var(--mono); font-size: 12px; }
    .audit-input.js-genre { grid-area: genre; font-family: var(--mono); font-size: 12px; color: var(--ink-faint); }
    /* Condition select — same visual class but its own grid slot.
       Words (e.g. "Very Good Plus") not abbreviations, so less letter-spacing. */
    .audit-select.js-condition {
      grid-area: cond;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      border: 1px solid var(--rule);
      background: var(--surface);
      padding: 8px 10px;
      border-radius: 2px;
      color: var(--ink);
      width: 100%;
      min-height: 36px;
      transition: border-color 120ms, background 120ms;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .audit-select.js-condition:hover { background: var(--bg-soft); }
    .audit-select.js-condition:focus { outline: none; border-color: var(--accent); }
    .audit-select.is-saving { border-color: var(--gold); }
    .audit-select.is-saved { border-color: var(--good); }
    .audit-select.is-error { border-color: var(--accent); }
    /* Phase 2 — pressing summary line (catalog no. in mono gold) */
    .audit-row__pressing {
      grid-area: press;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      padding: 4px 10px 0;
      line-height: 1.5;
    }
    .audit-row__pressing .catno { color: var(--gold); }
    .audit-row__pressing:empty { display: none; }
    .audit-row__actions {
      grid-area: actions;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .audit-row__lookup {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      cursor: pointer;
      border-radius: 2px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .audit-row__lookup:hover { border-color: var(--gold); color: var(--gold); }
    .audit-row__delete {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      cursor: pointer;
      border-radius: 2px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .audit-row__delete:hover { border-color: var(--accent); color: var(--accent); }
    .audit-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 18px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 200ms, transform 200ms;
      pointer-events: none;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }
    .audit-toast.is-on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .audit-toast.is-error { background: var(--accent); }
    .audit-empty {
      text-align: center;
      color: var(--ink-faint);
      padding: 80px 0;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    /* Phase 2 — Discogs pressing lookup modal */
    .lookup-modal {
      position: fixed;
      inset: 0;
      background: rgba(28,32,24,0.55);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
      z-index: 200;
    }
    .lookup-modal[hidden] { display: none; }
    .lookup-modal__panel {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 3px;
      max-width: 560px;
      width: 100%;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(28,32,24,0.3);
    }
    .lookup-modal__head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }
    .lookup-modal__title {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 20px;
      color: var(--ink);
    }
    .lookup-modal__close {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      padding: 8px 12px;
      border-radius: 2px;
      cursor: pointer;
      min-height: 36px;
    }
    .lookup-modal__close:hover { border-color: var(--accent); color: var(--accent); }
    .lookup-modal__sub {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      margin-bottom: 16px;
    }
    /* v11 — search-type chooser (artist+title OR catalog number) */
    .lookup-search {
      border: 1px solid var(--rule-soft);
      border-radius: 2px;
      padding: 14px;
      margin-bottom: 16px;
      background: var(--bg-soft);
    }
    .lookup-search__row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .lookup-search__btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 14px;
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-soft);
      cursor: pointer;
      border-radius: 2px;
      min-height: 44px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .lookup-search__btn:hover { border-color: var(--gold); color: var(--gold); }
    .lookup-search__hint {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink-soft);
      font-style: italic;
    }
    .lookup-search__or {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-align: center;
      margin: 10px 0;
    }
    .lookup-search__input {
      flex: 1;
      min-width: 180px;
      font-family: var(--mono);
      font-size: 16px; /* ≥16px: no iOS zoom */
      border: 1px solid var(--rule);
      background: var(--surface);
      padding: 11px 12px;
      border-radius: 2px;
      color: var(--ink);
      min-height: 44px;
      -webkit-appearance: none;
    }
    .lookup-search__input:focus { outline: none; border-color: var(--accent); }
    .lookup-search__note {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      margin-top: 8px;
      line-height: 1.5;
    }
    .lookup-status {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-faint);
      padding: 18px 0;
      text-align: center;
    }
    .lookup-status.is-error { color: var(--accent); text-align: left; }
    .lookup-candidate {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      text-align: left;
      padding: 12px;
      border: 1px solid var(--rule-soft);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .lookup-candidate:hover { border-color: var(--gold); background: var(--bg-soft); }
    .lookup-candidate__thumb {
      width: 48px; height: 48px; border-radius: 2px;
      object-fit: cover; background: var(--rule); display: block;
    }
    .lookup-candidate__title {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      display: block;
    }
    .lookup-candidate__meta {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      margin-top: 3px;
      line-height: 1.5;
      display: block;
    }
    .lookup-candidate__meta .catno { color: var(--gold); }
    @media (max-width: 640px) {
      .audit-toolbar { padding: 0 18px; }
      .audit-help { padding: 10px 18px; font-size: 10px; }
      .audit-list { padding: 12px 18px 60px; }
      .audit-row {
        grid-template-columns: 80px 1fr;
        grid-template-areas:
          "cover meta"
          "actions actions";
        gap: 14px;
        padding: 16px 0;
      }
      .audit-row__cover,
      .audit-row__cover img,
      .audit-row__cover .nocover {
        width: 80px;
        height: 80px;
      }
      .audit-row__meta {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "artist artist"
          "title title"
          "year genre"
          "cond cond"
          "press press";
        gap: 2px;
      }
      .audit-row__actions {
        flex-direction: row;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

<header class="masthead">
  <a class="brand" href="/">
    <span class="brand__mark">⦿</span>
    <h1>The Vinyl Scout</h1>
  </a>
  <nav class="masthead__nav">
    <a href="/">← Collection</a>
    <a href='/about'>About</a>
  </nav>
</header>

<h2 class="collection-title">Audit · Full Collection</h2>

<section class="audit-toolbar">
  <input
    type="search"
    id="filter-input"
    class="audit-toolbar__search"
    placeholder="Search artist, title, genre…"
    autocomplete="off"
    spellcheck="false" />
  <span class="audit-toolbar__count" id="filter-count">—</span>
</section>

<div class="audit-help">
  Edit any field → blur or <kbd>Enter</kbd> saves. Click cover to replace. Tap <kbd>Pressing</kbd> to look up a release on Discogs by artist+title or by catalog number. Condition uses Goldmine grading — see <a href='/about#grading'>About</a>.
</div>

<div id="error-banner" class="error-banner" hidden role="alert"></div>

<main class="audit-list" id="audit-list">
  <div class="audit-empty">Loading…</div>
</main>

<div class="audit-toast" id="toast"></div>

<div class="lookup-modal" id="lookup-modal" hidden>
  <div class="lookup-modal__panel" role="dialog" aria-modal="true" aria-label="Discogs pressing lookup">
    <div class="lookup-modal__head">
      <span class="lookup-modal__title" id="lookup-title">Pressing lookup</span>
      <button type="button" class="lookup-modal__close" id="lookup-close">Close</button>
    </div>
    <div class="lookup-modal__sub" id="lookup-sub"></div>
    <div id="lookup-body"></div>
  </div>
</div>

<script>
// Vinyl Scout — Audit page
// version: 13 (paired with style.css?v=19)
// v13: Phase 2 polish — third search path: exact Discogs release ID/URL (one
//      result, no list). artist+title results now ranked vinyl-first (endpoint v4).
// v12: number search checks BOTH catalog number AND barcode (?id=…; endpoint v3).
// v11: search-type chooser in the pressing modal: artist+title OR a number.
// v10: Phase 2 — Discogs pressing lookup (per-row "Pressing" button → candidate
//      picker → accept writes 5 additive fields via the existing single-upsert).
//      Lookup is a public GET to /api/discogs/lookup; accept POSTs to /api/records.
// Single-record ops only. No bulk delete, no auto-dedup, no background mutation.
// Condition select column uses Goldmine grading (default VG), stored as short code.

const GRADES = ['M', 'NM', 'VG+', 'VG', 'G+', 'G', 'F', 'P'];
const CONDITION_NAMES = {
  'M':   'Mint',
  'NM':  'Near Mint',
  'VG+': 'Very Good Plus',
  'VG':  'Very Good',
  'G+':  'Good Plus',
  'G':   'Good',
  'F':   'Fair',
  'P':   'Poor'
};

function normalizeCondition(c) {
  if (!c) return 'VG';
  const s = String(c).trim().toUpperCase();
  return GRADES.indexOf(s) !== -1 ? s : 'VG';
}

let allRecords = [];

function escapeHtml(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('is-error', !!isError);
  el.classList.add('is-on');
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { el.classList.remove('is-on'); }, 2200);
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.hidden = false;
}
function clearError() {
  const el = document.getElementById('error-banner');
  el.textContent = '';
  el.hidden = true;
}

function getEditSecret() {
  var s = '';
  try { s = sessionStorage.getItem('vs_edit_secret') || ''; } catch (e) {}
  if (s) return s;
  s = prompt('Enter edit passphrase (writes are protected):') || '';
  if (s) { try { sessionStorage.setItem('vs_edit_secret', s); } catch (e) {} }
  return s;
}
function clearEditSecret() {
  try { sessionStorage.removeItem('vs_edit_secret'); } catch (e) {}
}
async function api(path, opts) {
  opts = opts || {};
  var method = (opts.method || 'GET').toUpperCase();
  var headers = { 'Content-Type': 'application/json' };
  if (method === 'POST' || method === 'DELETE' || method === 'PUT' || method === 'PATCH') {
    var secret = getEditSecret();
    if (!secret) throw new Error('Edit passphrase required');
    headers['X-Edit-Key'] = secret;
  }
  opts.headers = headers;
  const res = await fetch(path, opts);
  if (res.status === 401) {
    clearEditSecret();
    throw new Error('Unauthorized — wrong passphrase. Try again.');
  }
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).error || ''; } catch (e) {}
    throw new Error('HTTP ' + res.status + (detail ? ' — ' + detail : ''));
  }
  if (res.status === 204) return null;
  return res.json();
}

async function loadRecords() {
  try {
    const data = await api('/api/records?bust=' + Date.now());
    allRecords = Array.isArray(data) ? data : [];
    clearError();
    render();
  } catch (err) {
    showError('Failed to load: ' + err.message);
    document.getElementById('audit-list').innerHTML = '<div class="audit-empty">Failed to load. Check error banner above.</div>';
  }
}

// Phase 2 — build the pressing summary line (only fields that are present).
function pressingLine(r) {
  var parts = [];
  if (r.label) parts.push(escapeHtml(r.label));
  if (r.catalog_no) parts.push('<span class="catno">' + escapeHtml(r.catalog_no) + '</span>');
  if (r.country) parts.push(escapeHtml(r.country));
  if (r.format) parts.push(escapeHtml(r.format));
  return parts.join(' · ');
}

function render() {
  const list = document.getElementById('audit-list');
  const filterEl = document.getElementById('filter-input');
  const countEl = document.getElementById('filter-count');
  const filter = (filterEl.value || '').toLowerCase().trim();

  const sorted = allRecords.slice().sort(function (a, b) {
    const ax = (a.artist || '').toLowerCase();
    const bx = (b.artist || '').toLowerCase();
    if (ax !== bx) return ax.localeCompare(bx);
    return (a.title || '').toLowerCase().localeCompare((b.title || '').toLowerCase());
  });

  const visible = sorted.filter(function (r) {
    if (!filter) return true;
    const hay = [r.artist, r.title, r.genre, r.year].filter(Boolean).join(' ').toLowerCase();
    return hay.indexOf(filter) !== -1;
  });

  countEl.textContent = visible.length + ' / ' + allRecords.length;

  if (visible.length === 0) {
    list.innerHTML = '<div class="audit-empty">' + (allRecords.length === 0 ? 'No records.' : 'No matches.') + '</div>';
    return;
  }

  list.innerHTML = visible.map(function (r) {
    const cover = r.cover_url
      ? '<img src="' + escapeHtml(r.cover_url) + '" alt="">'
      : '<div class="nocover">no cover</div>';
    const cond = normalizeCondition(r.condition);
    const condOptions = GRADES.map(function (g) {
      return '<option value="' + g + '"' + (g === cond ? ' selected' : '') + '>' + (CONDITION_NAMES[g] || g) + '</option>';
    }).join('');
    return ''
      + '<div class="audit-row" data-id="' + escapeHtml(r.id) + '">'
      +   '<label class="audit-row__cover">' + cover
      +     '<input type="file" accept="image/*" class="js-cover-upload">'
      +   '</label>'
      +   '<div class="audit-row__meta">'
      +     '<input class="audit-input js-artist" data-field="artist" value="' + escapeHtml(r.artist) + '" placeholder="artist" autocomplete="off" spellcheck="false">'
      +     '<input class="audit-input js-title" data-field="title" value="' + escapeHtml(r.title) + '" placeholder="title" autocomplete="off" spellcheck="false">'
      +     '<input class="audit-input js-year" data-field="year" value="' + (r.year != null ? r.year : '') + '" placeholder="year" autocomplete="off" spellcheck="false" inputmode="numeric">'
      +     '<input class="audit-input js-genre" data-field="genre" value="' + escapeHtml(r.genre || '') + '" placeholder="genre" autocomplete="off" spellcheck="false">'
      +     '<select class="audit-select js-condition" data-field="condition" title="Goldmine grade">' + condOptions + '</select>'
      +     '<div class="audit-row__pressing js-pressing">' + pressingLine(r) + '</div>'
      +   '</div>'
      +   '<div class="audit-row__actions">'
      +     '<button type="button" class="audit-row__lookup js-lookup">Pressing</button>'
      +     '<button type="button" class="audit-row__delete js-delete">Delete</button>'
      +   '</div>'
      + '</div>';
  }).join('');
}

async function saveField(id, field, raw, inputEl) {
  const existing = allRecords.find(function (r) { return r.id === id; });
  if (!existing) return;

  let value = raw;
  if (field === 'year') {
    if (raw.trim() === '') {
      value = null;
    } else {
      const n = parseInt(raw, 10);
      if (isNaN(n) || n < 1900 || n > 2100) {
        inputEl.classList.remove('is-saving', 'is-saved');
        inputEl.classList.add('is-error');
        toast('Year must be 1900–2100', true);
        return;
      }
      value = n;
    }
  }
  if (field === 'genre' && raw.trim() === '') value = null;
  if (field === 'artist' && raw.trim() === '') {
    inputEl.classList.add('is-error');
    toast('Artist cannot be empty', true);
    return;
  }
  if (field === 'title' && raw.trim() === '') {
    inputEl.classList.add('is-error');
    toast('Title cannot be empty', true);
    return;
  }
  if (field === 'condition') {
    // Always normalize — never let an invalid value escape to storage
    value = normalizeCondition(raw);
  }

  if (existing[field] === value) return;

  const merged = Object.assign({}, existing, {});
  merged[field] = value;

  inputEl.classList.remove('is-error', 'is-saved');
  inputEl.classList.add('is-saving');
  try {
    await api('/api/records', { method: 'POST', body: JSON.stringify(merged) });
    existing[field] = value;
    inputEl.classList.remove('is-saving');
    inputEl.classList.add('is-saved');
    setTimeout(function () { inputEl.classList.remove('is-saved'); }, 1600);
  } catch (err) {
    inputEl.classList.remove('is-saving');
    inputEl.classList.add('is-error');
    toast('Save failed: ' + err.message, true);
  }
}

async function deleteRecord(id) {
  const existing = allRecords.find(function (r) { return r.id === id; });
  if (!existing) return;
  const label = (existing.artist || '?') + ' — ' + (existing.title || '?');
  if (!confirm('Delete this record?\n\n' + label + '\n\nID: ' + id)) return;
  try {
    await api('/api/records/' + encodeURIComponent(id), { method: 'DELETE' });
    allRecords = allRecords.filter(function (r) { return r.id !== id; });
    render();
    toast('Deleted');
  } catch (err) {
    toast('Delete failed: ' + err.message, true);
  }
}

function compressImage(file, maxDim, quality) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onload = function (e) {
      const img = new Image();
      img.onload = function () {
        let w = img.width;
        let h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) {
            h = Math.round(h * maxDim / w);
            w = maxDim;
          } else {
            w = Math.round(w * maxDim / h);
            h = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) {
          reject(err);
        }
      };
      img.onerror = function () { reject(new Error('Could not decode image')); };
      img.src = e.target.result;
    };
    reader.onerror = function () { reject(new Error('Could not read file')); };
    reader.readAsDataURL(file);
  });
}

async function uploadCover(id, file, coverEl) {
  const existing = allRecords.find(function (r) { return r.id === id; });
  if (!existing) return;
  if (!file.type.startsWith('image/')) {
    toast('Not an image file', true);
    return;
  }
  coverEl.classList.add('is-uploading');
  try {
    const dataUrl = await compressImage(file, 600, 0.82);
    if (dataUrl.length > 4 * 1024 * 1024) {
      throw new Error('Compressed image still too large');
    }
    const base64 = dataUrl.split(',')[1];
    const saved = await api('/api/save-cover', {
      method: 'POST',
      body: JSON.stringify({ recordId: id, contentType: 'image/jpeg', dataBase64: base64 }),
    });
    const merged = Object.assign({}, existing, { cover_url: saved.cover_url });
    await api('/api/records', { method: 'POST', body: JSON.stringify(merged) });
    existing.cover_url = saved.cover_url;
    const cacheBusted = saved.cover_url + '?v=' + Date.now();
    const img = coverEl.querySelector('img');
    if (img) {
      img.src = cacheBusted;
    } else {
      const nc = coverEl.querySelector('.nocover');
      if (nc) {
        const newImg = document.createElement('img');
        newImg.src = cacheBusted;
        newImg.alt = '';
        coverEl.replaceChild(newImg, nc);
      }
    }
    coverEl.classList.remove('is-uploading');
    toast('Cover updated');
  } catch (err) {
    coverEl.classList.remove('is-uploading');
    toast('Upload failed: ' + err.message, true);
  }
}

// ---- Phase 2: Discogs pressing lookup ----
// lookupState holds the record being looked up and the candidates returned,
// so an accept click can reference the exact candidate by index.
// v13: three search paths — artist+title (vinyl-ranked), catalog#/barcode,
//      and exact Discogs release ID/URL (one result, no list).
var lookupState = { id: null, candidates: [] };

function openLookup(id) {
  var rec = allRecords.find(function (r) { return r.id === id; });
  if (!rec) return;
  lookupState = { id: id, candidates: [] };
  var modal = document.getElementById('lookup-modal');
  document.getElementById('lookup-title').textContent = 'Pressing lookup';
  document.getElementById('lookup-sub').textContent = (rec.artist || '?') + ' — ' + (rec.title || '?');
  // Show the search chooser first; nothing runs until Susan picks a mode.
  renderSearchControls(rec);
  modal.hidden = false;
}

// Render the search-type chooser + a results area beneath it.
function renderSearchControls(rec) {
  var body = document.getElementById('lookup-body');
  body.innerHTML = ''
    + '<div class="lookup-search">'
    +   '<div class="lookup-search__row">'
    +     '<button type="button" class="lookup-search__btn js-search-meta">Search artist + title</button>'
    +     '<span class="lookup-search__hint">' + escapeHtml((rec.artist || '?') + ' — ' + (rec.title || '?')) + '</span>'
    +   '</div>'
    +   '<div class="lookup-search__or">or</div>'
    +   '<div class="lookup-search__row">'
    +     '<input type="text" id="lookup-catno" class="lookup-search__input" placeholder="Catalog # or barcode, e.g. 7599-23703-1" autocomplete="off" spellcheck="false" inputmode="latin">'
    +     '<button type="button" class="lookup-search__btn js-search-catno">Search number</button>'
    +   '</div>'
    +   '<div class="lookup-search__note">Type any number off the sleeve — catalog number or barcode. Both are checked.</div>'
    +   '<div class="lookup-search__or">or</div>'
    +   '<div class="lookup-search__row">'
    +     '<input type="text" id="lookup-relid" class="lookup-search__input" placeholder="Discogs release ID or URL" autocomplete="off" spellcheck="false" inputmode="latin">'
    +     '<button type="button" class="lookup-search__btn js-search-relid">Go to exact release</button>'
    +   '</div>'
    +   '<div class="lookup-search__note">Most precise — paste a Discogs ID or the URL ending in /release/NNNN. Returns one result, no list.</div>'
    + '</div>'
    + '<div id="lookup-results"></div>';
}

// Run a search. mode is 'meta' (artist+title) or 'catno' (catalog number).
function runSearch(mode) {
  var rec = allRecords.find(function (r) { return r.id === lookupState.id; });
  if (!rec) return;
  var q = new URLSearchParams();
  if (mode === 'relid') {
    var relEl = document.getElementById('lookup-relid');
    var rel = relEl ? relEl.value.trim() : '';
    if (!rel) {
      setResults('<div class="lookup-status is-error">Paste a Discogs release ID or URL first.</div>');
      return;
    }
    // Accept a bare number or a pasted URL; the endpoint extracts the digits too.
    q.set('release_id', rel);
  } else if (mode === 'catno') {
    var catEl = document.getElementById('lookup-catno');
    var catno = catEl ? catEl.value.trim() : '';
    if (!catno) {
      setResults('<div class="lookup-status is-error">Enter a catalog number or barcode first.</div>');
      return;
    }
    q.set('id', catno);
  } else {
    if (rec.artist) q.set('artist', rec.artist);
    if (rec.title) q.set('title', rec.title);
    if (!rec.artist && !rec.title) {
      setResults('<div class="lookup-status is-error">This record has no artist or title to search.</div>');
      return;
    }
  }

  setResults('<div class="lookup-status">Searching Discogs…</div>');

  // Lookup is a public GET (no edit secret); accepting a pressing is the write.
  fetch('/api/discogs/lookup?' + q.toString())
    .then(function (res) {
      return res.json().then(function (data) {
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        return data;
      });
    })
    .then(function (data) {
      lookupState.candidates = Array.isArray(data.candidates) ? data.candidates : [];
      renderCandidates();
    })
    .catch(function (err) {
      setResults('<div class="lookup-status is-error">Lookup failed: ' + escapeHtml(err.message) + '</div>');
    });
}

// Write into the results area, leaving the search chooser in place.
function setResults(html) {
  var r = document.getElementById('lookup-results');
  if (r) r.innerHTML = html;
}

function renderCandidates() {
  if (!lookupState.candidates.length) {
    setResults('<div class="lookup-status">No Discogs matches. Try the other search, or adjust your input.</div>');
    return;
  }
  setResults(lookupState.candidates.map(function (c, i) {
    var thumb = c.thumb
      ? '<img class="lookup-candidate__thumb" src="' + escapeHtml(c.thumb) + '" alt="">'
      : '<span class="lookup-candidate__thumb"></span>';
    var meta = [];
    if (c.year) meta.push(escapeHtml(String(c.year)));
    if (c.label) meta.push(escapeHtml(c.label));
    if (c.catalog_no) meta.push('<span class="catno">' + escapeHtml(c.catalog_no) + '</span>');
    if (c.country) meta.push(escapeHtml(c.country));
    if (c.format) meta.push(escapeHtml(c.format));
    return ''
      + '<button type="button" class="lookup-candidate js-candidate" data-idx="' + i + '">'
      +   thumb
      +   '<span>'
      +     '<span class="lookup-candidate__title">' + escapeHtml(c.display_title || '(untitled)') + '</span>'
      +     '<span class="lookup-candidate__meta">' + meta.join(' · ') + '</span>'
      +   '</span>'
      + '</button>';
  }).join(''));
}

async function acceptPressing(idx) {
  var cand = lookupState.candidates[idx];
  var id = lookupState.id;
  if (!cand || !id) return;
  var existing = allRecords.find(function (r) { return r.id === id; });
  if (!existing) return;

  // Write only the 5 additive pressing fields; everything else preserved.
  var merged = Object.assign({}, existing, {
    discogs_release_id: cand.discogs_release_id != null ? cand.discogs_release_id : null,
    label: cand.label || null,
    catalog_no: cand.catalog_no || null,
    country: cand.country || null,
    format: cand.format || null
  });

  setResults('<div class="lookup-status">Applying…</div>');
  try {
    await api('/api/records', { method: 'POST', body: JSON.stringify(merged) });
    existing.discogs_release_id = merged.discogs_release_id;
    existing.label = merged.label;
    existing.catalog_no = merged.catalog_no;
    existing.country = merged.country;
    existing.format = merged.format;
    closeLookup();
    render();
    toast('Pressing applied');
  } catch (err) {
    setResults('<div class="lookup-status is-error">Apply failed: ' + escapeHtml(err.message) + '</div>');
  }
}

function closeLookup() {
  var modal = document.getElementById('lookup-modal');
  if (modal) modal.hidden = true;
  lookupState = { id: null, candidates: [] };
}

(async function init() {
  await loadRecords();
  const list = document.getElementById('audit-list');
  const filterInput = document.getElementById('filter-input');
  filterInput.addEventListener('input', render);

  list.addEventListener('focusout', function (e) {
    const inp = e.target.closest('.audit-input');
    if (!inp) return;
    const row = inp.closest('.audit-row');
    if (!row) return;
    saveField(row.dataset.id, inp.dataset.field, inp.value, inp);
  });

  list.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.target.closest('.audit-input')) {
      e.preventDefault();
      e.target.blur();
    }
  });

  list.addEventListener('click', function (e) {
    // Pressing lookup
    const lookupBtn = e.target.closest('.js-lookup');
    if (lookupBtn) {
      const row = lookupBtn.closest('.audit-row');
      if (row) openLookup(row.dataset.id);
      return;
    }
    // Delete
    const btn = e.target.closest('.js-delete');
    if (!btn) return;
    const row = btn.closest('.audit-row');
    if (!row) return;
    deleteRecord(row.dataset.id);
  });

  list.addEventListener('change', function (e) {
    // Cover upload
    const inp = e.target.closest('.js-cover-upload');
    if (inp) {
      const file = inp.files && inp.files[0];
      if (!file) return;
      const row = inp.closest('.audit-row');
      const coverEl = inp.closest('.audit-row__cover');
      if (!row || !coverEl) return;
      uploadCover(row.dataset.id, file, coverEl);
      inp.value = '';
      return;
    }
    // Condition select
    const sel = e.target.closest('.audit-select.js-condition');
    if (sel) {
      const row = sel.closest('.audit-row');
      if (!row) return;
      saveField(row.dataset.id, sel.dataset.field, sel.value, sel);
    }
  });

  // Lookup modal: backdrop click closes; candidate click accepts; Close button; Esc.
  const modal = document.getElementById('lookup-modal');
  modal.addEventListener('click', function (e) {
    if (e.target === modal) { closeLookup(); return; }
    if (e.target.closest('.js-search-meta')) { runSearch('meta'); return; }
    if (e.target.closest('.js-search-catno')) { runSearch('catno'); return; }
    if (e.target.closest('.js-search-relid')) { runSearch('relid'); return; }
    const cand = e.target.closest('.js-candidate');
    if (cand) { acceptPressing(parseInt(cand.dataset.idx, 10)); return; }
  });
  // Enter inside either number field runs that search.
  modal.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (e.target.id === 'lookup-catno') { e.preventDefault(); runSearch('catno'); }
    else if (e.target.id === 'lookup-relid') { e.preventDefault(); runSearch('relid'); }
  });
  document.getElementById('lookup-close').addEventListener('click', closeLookup);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeLookup();
  });
})();
</script>
