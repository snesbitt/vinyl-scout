<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f1ebdc" />
  <title>The Vinyl Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=12" />
</head>
<body data-view="gallery">

<a class="sr-only sr-only-focusable" href="#main">Skip to records</a>

<header class="masthead">
  <a class="brand" href="/" aria-label="The Vinyl Scout — home">
    <span class="brand__mark" aria-hidden="true">⦿</span>
    <h1>The Vinyl Scout</h1>
  </a>
  <nav class="masthead__nav" aria-label="Primary">
    <a href="/seed.html">Add</a>
    <a href="/audit.html">Audit</a>
    <a href="/about.html">About</a>
  </nav>
</header>

<section class="controls" aria-label="Filters">
  <div class="controls__heading">
    <h2 class="controls__title">Full Collection</h2>
    <span class="controls__count" id="count">— records</span>
  </div>
  <div class="controls__search">
    <label for="search" class="sr-only">Search the collection</label>
    <input
      id="search"
      type="search"
      placeholder="Search artist, title, year…"
      autocomplete="off"
      spellcheck="false" />
  </div>
  <div class="controls__view" role="group" aria-label="View mode">
    <button id="view-list" class="vbtn" type="button" aria-pressed="false">List</button>
    <button id="view-gallery" class="vbtn is-on" type="button" aria-pressed="true">Gallery</button>
  </div>
  <div class="controls__chips" id="chips" role="group" aria-label="Filter by genre"></div>
</section>

<div id="error-banner" class="error-banner" hidden role="alert"></div>

<main id="main" class="gallery" tabindex="-1" aria-label="Records">
  <div class="empty">Loading…</div>
</main>

<div
  id="detail"
  class="detail"
  hidden
  role="dialog"
  aria-modal="true"
  aria-labelledby="detail-title"
  tabindex="-1">
  <div class="detail__backdrop" data-close="1" aria-hidden="true"></div>
  <article class="detail__panel" id="detail-panel">
    <button id="detail-close" class="detail__close" type="button" aria-label="Close detail">×</button>
    <div class="detail__inner" id="detail-inner"></div>
  </article>
</div>

<script src="/app.js?v=12"></script>
</body>
</html>
