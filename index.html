<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinyl Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=4" />
</head>
<body>

<header class="masthead">
  <a class="brand" href="/">
    <span class="brand__mark">⦿</span>
    <div>
      <h1>The Vinyl Scout</h1>
      <p class="brand__sub">Catalog</p>
    </div>
  </a>
</header>

<h2 class="collection-title">Full Collection</h2>

<section class="controls">
  <div class="controls__left">
    <input
      type="search"
      id="filter-input"
      class="controls__search-input"
      placeholder="Search artist, title, genre…"
      autocomplete="off"
      spellcheck="false" />
    <span class="controls__count" id="filter-count"></span>
  </div>
  <div class="controls__right">
    <a class="btn btn--ghost btn--sm" href="/seed.html">Add via JSON</a>
    <div class="view-toggle" role="tablist">
      <button class="view-toggle__btn is-on" data-display="list" type="button" title="List view">
        <span class="view-toggle__icon">☰</span> List
      </button>
      <button class="view-toggle__btn" data-display="grid" type="button" title="Gallery view">
        <span class="view-toggle__icon">▦</span> Gallery
      </button>
    </div>
  </div>
</section>

<div id="error-banner" class="error-banner" hidden></div>

<main class="stack" id="card-stack">
  <div class="empty" id="empty-state">
    <p class="empty__big">Loading…</p>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module" src="/app.js?v=4"></script>
</body>
</html>
